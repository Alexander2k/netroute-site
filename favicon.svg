<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1e2e"/>
      <stop offset="100%" stop-color="#0e1117"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#39d5ff"/>
    </linearGradient>
    <linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39d5ff"/>
      <stop offset="100%" stop-color="#1a73e8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="40" fill="none" stroke="url(#ring)" stroke-width="5"/>
  <!-- Inner dot -->
  <circle cx="64" cy="64" r="14" fill="url(#core)"/>
  <!-- Subtle glow -->
  <circle cx="64" cy="64" r="14" fill="url(#core)" opacity="0.3" filter="blur(8px)"/>
</svg>
